services:
  ai:
    build:
      context: .
      target: development
      args:
        LOCAL_DEV: "true"
    ports:
      - "8082:8082"
    environment:
      - TZ=Asia/Tokyo
    volumes:
      - .:/app
    healthcheck:
      test: curl -f http://localhost:8082/health
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s
