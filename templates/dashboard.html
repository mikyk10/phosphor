<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 800px;
    height: 480px;
    font-family: 'Noto Sans CJK JP', sans-serif;
    background: #fff;
    color: #222;
    display: flex;
    flex-direction: column;
    padding: 24px;
  }
  h1 {
    font-size: 28px;
    margin-bottom: 16px;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    flex: 1;
  }
  .card {
    background: #f5f5f5;
    border-radius: 12px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .card .label {
    font-size: 14px;
    color: #888;
    margin-bottom: 4px;
  }
  .card .value {
    font-size: 36px;
    font-weight: bold;
  }
  .footer {
    margin-top: 16px;
    font-size: 12px;
    color: #aaa;
    text-align: right;
  }
</style>
</head>
<body>
  <h1>Dashboard</h1>
  <div class="grid">
    <div class="card">
      <span class="label">Temperature</span>
      <span class="value">23.4°C</span>
    </div>
    <div class="card">
      <span class="label">Humidity</span>
      <span class="value">58%</span>
    </div>
    <div class="card">
      <span class="label">Photos</span>
      <span class="value">1,247</span>
    </div>
    <div class="card">
      <span class="label">Uptime</span>
      <span class="value">14d 3h</span>
    </div>
  </div>
  <div class="footer">Last updated: 2026-03-26 21:30 JST</div>
</body>
</html>
